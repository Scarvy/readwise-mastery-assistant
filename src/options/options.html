<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Readwise Mastery Assistant — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>Readwise Mastery Assistant</h1>
      <p class="subtitle">
        Enter your Anthropic API key to enable AI flashcard suggestions on
        Readwise's Daily Review page.
      </p>

      <form id="settings-form">
        <label for="api-key">Anthropic API key</label>
        <input
          type="password"
          id="api-key"
          name="api-key"
          placeholder="sk-ant-..."
          autocomplete="off"
        />
        <p class="hint">
          Stored locally in your browser (<code>chrome.storage.local</code>)
          and sent only to <code>api.anthropic.com</code>. Get a key at
          <a
            href="https://console.anthropic.com/settings/keys"
            target="_blank"
            rel="noopener"
            >console.anthropic.com</a
          >.
        </p>

        <label for="model">Model</label>
        <select id="model" name="model">
          <option value="claude-haiku-4-5-20251001">
            Claude Haiku 4.5 (fast &amp; cheap — recommended)
          </option>
          <option value="claude-sonnet-4-6">
            Claude Sonnet 4.6 (higher quality)
          </option>
        </select>

        <div class="actions">
          <button type="submit">Save</button>
          <span id="status" role="status"></span>
        </div>
      </form>
    </main>
    <script src="options.js"></script>
  </body>
</html>
